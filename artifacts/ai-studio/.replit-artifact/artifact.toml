kind = "web"
previewPath = "/"
title = "AI Studio Platform"
version = "1.0.0"
id = "artifacts/ai-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22936
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-studio run dev"

[services.env]
PORT = "22936"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-studio", "run", "build"]
publicDir = "artifacts/ai-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
